<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MDS KEHADIRAN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5;}

.header{background:white;padding:10px;border-bottom:3px solid black;}

.box{display:none;padding:10px;}

input,select,button{width:85%;padding:10px;margin:5px;}

button{background:#2c3e50;color:white;}

#reader{background:white;padding:10px;border-radius:10px;}

.card{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%) scale(0.5);
background:white;padding:15px;
opacity:0;transition:0.3s;
}

.card.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

/* SIGN */
#signBox{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.sign{
background:white;
width:90%;
max-width:350px;
margin:80px auto;
padding:10px;
}

canvas{
width:100%;
height:180px;
border:1px solid #ccc;
background:white;
touch-action:none;
}
</style>
</head>

<body>

<div class="header">
<h3>MDS KEHADIRAN MESYUARAT</h3>
</div>

<div id="login" class="box" style="display:block;">
<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Pass">
<button onclick="login()">Login</button>
</div>

<div id="dash" class="box">

<select id="mesyuarat">
<option value="">Pilih Mesyuarat</option>
<option>Perlesenan</option>
<option>Pengurusan</option>
<option>Komuniti</option>
</select>

<div id="reader"></div>

<button onclick="pdf()">PDF</button>

</div>

<div id="card" class="card">
<h3 id="nama"></h3>
<p id="jawatan"></p>
</div>

<!-- SIGN -->
<div id="signBox">
<div class="sign">

<h3>Tandatangan</h3>
<canvas id="pad"></canvas>

<button onclick="clearSig()">Clear</button>
<button onclick="saveSig()">Save</button>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz1yv8nYbWaQCqPXjYZVxy3Cc411Sp4akQVDFxYQqjEGL4hKvHCLGDMJ_NhrWcFwW3dbQ/exec";

let scanner,current;
let scanLock=false;

/* LOGIN FIX */
function login(){

fetch(`${API}?action=login&user=${user.value}&pass=${pass.value}`)
.then(r=>r.json())
.then(r=>{

if(r.success){
document.getElementById("login").style.display="none";
document.getElementById("dash").style.display="block";
startQR();
}else alert("Login gagal");

});

}

/* QR */
function startQR(){

scanner=new Html5Qrcode("reader");

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:200},

text=>{

if(scanLock)return;
scanLock=true;

fetch(`${API}?action=scan&id=${text}&mesyuarat=${mesyuarat.value}`)
.then(r=>r.json())
.then(r=>{

if(r.error){
alert(r.error);
scanLock=false;
return;
}

nama.innerText=r.nama;
jawatan.innerText=r.jawatan;

card.classList.add("show");

current=r;

/* SIGN */
signBox.style.display="block";

setTimeout(()=>scanLock=false,1500);

});

});

}

/* SIGN FIX */
let canvas=document.getElementById("pad");
let ctx=canvas.getContext("2d");
let draw=false;

canvas.onmousedown=e=>{
draw=true;
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
};

canvas.onmouseup=()=>draw=false;

canvas.onmousemove=e=>{
if(!draw)return;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
};

/* CLEAR */
function clearSig(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* SAVE */
function saveSig(){

let sign=canvas.toDataURL();

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"sign",
id:current.id,
sign:sign
})
}).then(()=>{

signBox.style.display="none";
clearSig();

});

}

/* PDF */
function pdf(){
let t=prompt("Tarikh YYYY-MM-DD");
window.open(`${API}?action=pdf&mesyuarat=${mesyuarat.value}&tarikh=${t}`);
}

</script>

</body>
</html>
