<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran MDS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#f5f5f5;
  margin:0;
}

.letterhead{padding:12px 0;}
.logo{width:85px;}
.org-name{font-weight:bold;font-size:16px;}
.org-address{font-size:12px;color:#444;}

.panel{
  background:white;
  margin:12px;
  padding:18px;
  border-radius:12px;
  text-align:left;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

input,select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:5px;
}

button{
  width:90%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#3498db;
  color:white;
  cursor:pointer;
}

button:hover{background:#2980b9;}

#reader{width:300px;margin:auto;}

.card{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  opacity:0;
  transition:0.3s;
}
.card.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.popup{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:99999;
}
.popup.show{opacity:1;visibility:visible;}

.loading{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

.spinner{
  width:50px;height:50px;
  border:5px solid #ccc;
  border-top:5px solid #2ecc71;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

#bilBox,#programBox{display:none;}

</style>
</head>

<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p id="loadingText">Loading...</p>
</div>

<div class="letterhead">
  <img class="logo" src="mds.png">
  <div class="org-name">MAJLIS DAERAH SIMUNJAN</div>
  <div class="org-address">Lot 805, Gunong Ngeli New Service Centre,<br>94800 Simunjan, Sarawak</div>
</div>

<h3>🏢 Sistem Kehadiran MDS</h3>

<div id="loginBox">
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<button onclick="openAhliPage()" style="background:#2ecc71;">👤 Paparan QR Code Ahli</button>

<div id="dashboard" style="display:none;">

<div class="panel">

<label>Jenis Mesyuarat / Program</label>
<select id="jenisMesyuarat" onchange="toggleOptions()">
  <option value="">-- Pilih --</option>

  <option value="Jawatankuasa Kewangan" data-bil="1">Jawatankuasa Kewangan</option>
  <option value="Jawatankuasa Perlesenan" data-bil="1">Jawatankuasa Perlesenan</option>
  <option value="Jawatankuasa Pengurusan" data-bil="1">Jawatankuasa Pengurusan</option>

  <option value="Perhimpunan Bulanan Staf" data-bil="0">Perhimpunan Bulanan Staf</option>
  <option value="Taklimat Khas" data-bil="0">Taklimat Khas</option>

  <option value="Program Komuniti" data-bil="0">Program Komuniti</option>
</select>

<div id="programBox">
  <label>Nama Program Komuniti</label>
  <input id="namaProgram" placeholder="Contoh: Gotong-Royong Perdana">
</div>

<div id="bilBox">
  <label>Bil Mesyuarat</label>
  <select id="bilMesyuarat">
    <option>Bil.1/2026</option>
    <option>Bil.2/2026</option>
    <option>Bil.3/2026</option>
    <option>Bil.4/2026</option>
  </select>
</div>

<label>Tarikh</label>
<input type="date" id="tarikh">

<label>Masa Mula</label>
<input type="time" id="masaMula">

<label>Masa Tamat</label>
<input type="time" id="masaTamat">

<label>Tempat</label>
<select id="tempat" onchange="toggleTempat(this.value)">
  <option value="Bilik Mesyuarat Utama">Bilik Mesyuarat Utama</option>
  <option value="Bilik Jawatankuasa">Bilik Jawatankuasa</option>
  <option value="lain">Lain-lain</option>
</select>

<input type="text" id="tempatLain" placeholder="Isi lokasi lain">

<button onclick="printPDF()">🖨️ Print PDF</button>

</div>

<h3>📷 Scan QR</h3>
<div id="reader"></div>

</div>

<div id="card" class="card">
  <h2 id="nama"></h2>
  <p id="jawatan"></p>
  <p>✔ HADIR</p>
</div>

<div id="popup" class="popup">
  <h3>✔ Berjaya Direkod</h3>
  <p id="pNama"></p>
  <p id="pJawatan"></p>
  <button onclick="closePopup()">OK</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzMH6Z82wbAu8jRPnwAM_rdEVnUpYK557HsgtPNz30nM3WTsVJ1sycMWkolv1sFhLk3/exec";
let scanner;
let lock=false;

function toggleOptions(){
  let s = jenisMesyuarat.options[jenisMesyuarat.selectedIndex];

  bilBox.style.display = s.getAttribute("data-bil")==="1"?"block":"none";
  programBox.style.display = (jenisMesyuarat.value==="Program Komuniti")?"block":"none";
}

function getMesyuaratFull(){
  let jenis = jenisMesyuarat.value;
  if(!jenis) return null;

  if(jenis==="Program Komuniti"){
    return jenis + " - " + (namaProgram.value||"");
  }

  let s = jenisMesyuarat.options[jenisMesyuarat.selectedIndex];
  if(s.getAttribute("data-bil")==="1"){
    return jenis + " " + bilMesyuarat.value;
  }

  return jenis;
}

function getMasa(){
  return masaMula.value + " - " + masaTamat.value;
}

function toggleTempat(v){
  tempatLain.style.display = v==="lain"?"block":"none";
}

function getTempat(){
  return tempat.value==="lain"?tempatLain.value:tempat.value;
}

function login(){
  fetch(API,{method:"POST",body:JSON.stringify({action:"login",user:user.value,pass:pass.value})})
  .then(r=>r.json())
  .then(res=>{
    if(!res.success) return alert("Login gagal");
    loginBox.style.display="none";
    dashboard.style.display="block";
    startQR();
  });
}

function startQR(){
  scanner=new Html5Qrcode("reader");
  scanner.start({facingMode:"environment"},{fps:10,qrbox:250},text=>{

    if(lock) return;
    lock=true;
    scanner.stop();

    fetch(API,{method:"POST",body:JSON.stringify({
      id:text,
      mesyuarat:getMesyuaratFull(),
      tempat:getTempat(),
      masa:getMasa()
    })})
    .then(r=>r.json())
    .then(res=>{

      nama.innerText=res.nama||"-";
      jawatan.innerText=res.jawatan||"-";

      card.classList.add("show");
      setTimeout(()=>card.classList.remove("show"),2000);

      showPopup(res.nama,res.jawatan);

      setTimeout(()=>{
        lock=false;
        startQR();
      },1500);

    });

  });
}

function showPopup(n,j){
  pNama.innerText="Nama: "+n;
  pJawatan.innerText="Jawatan: "+j;
  popup.classList.add("show");
}
function closePopup(){popup.classList.remove("show");}
}
function printPDF(){

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"pdf",
      tarikh: tarikh.value,
      mesyuarat: getMesyuaratFull(),
      tempat: getTempat(),
      masa: getMasa()
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.url){
      window.open(res.url,"_blank");
    }else{
      alert("PDF gagal dijana");
    }
  })
  .catch(err=>{
    console.log(err);
    alert("Ralat PDF");
  });

}

</script>

</body>
</html>
