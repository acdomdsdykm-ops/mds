<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MDS KEHADIRAN</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5;}
.header{background:white;padding:10px;border-bottom:3px solid black;}
.logo{width:80px;}
.box{display:none;padding:10px;}

input,select,button{
width:85%;padding:10px;margin:5px;border-radius:8px;
}

button{background:#2c3e50;color:white;}

#reader{background:white;padding:10px;border-radius:10px;}

.card{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%) scale(0.5);
background:white;padding:20px;border-radius:12px;
opacity:0;transition:0.3s;
}

.card.show{opacity:1;transform:translate(-50%,-50%) scale(1);}

/* SIGN */
#signBox{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.sign{
background:white;
width:90%;max-width:350px;
margin:80px auto;
padding:10px;
border-radius:10px;
}

canvas{border:1px solid #ccc;width:100%;height:180px;}
</style>
</head>

<body>

<div class="header">
<img class="logo" src="mds.png">
<h3>MDS KEHADIRAN MESYUARAT</h3>
</div>

<div id="login">
<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Pass">
<button onclick="login()">Login</button>
</div>

<div id="dash" class="box">

<select id="mes">
<option value="">Pilih Mesyuarat</option>
<option>Perlesenan</option>
<option>Pengurusan</option>
<option>Komuniti</option>
</select>

<div id="reader"></div>

<button onclick="pdf()">Print PDF</button>

</div>

<div id="card" class="card">
<h3 id="nama"></h3>
<p id="jaw"></p>
</div>

<!-- SIGN -->
<div id="signBox">
<div class="sign">
<h3>Tandatangan</h3>
<canvas id="pad"></canvas>
<br>
<button onclick="clearSig()">Clear</button>
<button onclick="saveSig()">Save</button>
</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyis-UjGf89bGST8zOaGXAE0_BuF90AXfGf7EFxLiyX8-YeEs8txOFG48c8SW8_uVXaiA/exec";

let scanLock=false;
let current;

function login(){

fetch(`${API}?action=login&user=${user.value}&pass=${pass.value}`)
.then(r=>r.json())
.then(r=>{

if(r.success){

document.getElementById("login").style.display="none";
document.getElementById("dash").style.display="block";

startQR();

}else{
alert("Login gagal");
}

});

}
function startQR(){
const qr=new Html5Qrcode("reader");

qr.start({facingMode:"environment"},{fps:10,qrbox:200},
text=>{

if(scanLock)return;
scanLock=true;

fetch(`${API}?action=scan&id=${text}&mesyuarat=${mes.value}`)
.then(r=>r.json())
.then(r=>{

if(r.error){
alert(r.error);
}else{
nama.innerText=r.nama;
jaw.innerText=r.jawatan;
card.classList.add("show");

current=r;

/* SIGN */
signBox.style.display="block";
}

setTimeout(()=>scanLock=false,1500);

});

});
}

/* SIGN FIX */
let canvas=document.getElementById("pad");
let ctx=canvas.getContext("2d");
let d=false;

canvas.width=300;
canvas.height=180;

canvas.onmousedown=e=>{d=true;ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY);}
canvas.onmouseup=()=>d=false;
canvas.onmousemove=e=>{if(d){ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();}}

function clearSig(){ctx.clearRect(0,0,300,180);}

function saveSig(){

const sign=canvas.toDataURL();

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"sign",
id:current.id,
sign:sign
})
}).then(()=>{

signBox.style.display="none";
clearSig();

});
}

/* PDF */
function pdf(){
const t=prompt("Tarikh YYYY-MM-DD");
window.open(`${API}?action=pdf&mesyuarat=${mes.value}&tarikh=${t}`);
}

</script>

</body>
</html>
