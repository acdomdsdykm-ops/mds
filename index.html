<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran MDS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#f5f5f5;
  margin:0;
}

/* HEADER */
.letterhead{
  text-align:center;
  padding:10px 0;
}

.logo{
  width:85px;
  display:block;
  margin:auto;
}

.org-name{
  font-weight:bold;
  font-size:16px;
}

.org-address{
  font-size:12px;
  color:#444;
}

/* PANEL */
.panel{
  background:white;
  margin:12px;
  padding:18px;
  border-radius:12px;
  text-align:left;
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BUTTON */
button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#3498db;
  color:white;
  cursor:pointer;
}

/* QR */
#reader{
  width:300px;
  margin:auto;
}

/* CARD */
.card{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  opacity:0;
  transition:0.3s;
}

.card.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

/* LOADING */
.loading{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  z-index:9999;
}

.spinner{
  width:50px;
  height:50px;
  border:5px solid #ccc;
  border-top:5px solid #2ecc71;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}

/* POPUP */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:99999;
  width:300px;
}

.popup.show{
  opacity:1;
  visibility:visible;
}

.popup h3{
  color:#2ecc71;
}

.popup button{
  background:#2ecc71;
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="spinner"></div>
  <p id="loadingText">Loading...</p>
</div>

<!-- HEADER -->
<div class="letterhead">
  <img class="logo" src="mds.png">
  <div class="org-name">MAJLIS DAERAH SIMUNJAN</div>
  <div class="org-address">
    Lot 805, Gunong Ngeli New Service Centre,<br>
    94800 Simunjan, Sarawak
  </div>
</div>

<h3>🏢 Sistem Kehadiran MDS</h3>

<!-- LOGIN -->
<div id="loginBox">
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- 👤 BUTTON BARU (QR AHLI) -->
<button onclick="openAhliPage()" style="background:#2ecc71;">
👤 Paparan QR Code Ahli Mesyuarat
</button>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="panel">

<label>Mesyuarat</label>
<select id="mesyuarat">
  <option>Perlesenan</option>
  <option>Pengurusan</option>
</select>

<label>Tarikh</label>
<input type="date" id="tarikh">

<label>Masa</label>
<select id="masa">
  <option>9.00am - 12.00pm</option>
  <option>2.30pm - 5.00pm</option>
</select>

<label>Tempat</label>
<select id="tempat">
  <option>Bilik Mesyuarat Utama</option>
  <option>Bilik Jawatankuasa</option>
</select>

<button onclick="printPDF()">🖨️ Print PDF</button>

</div>

<h3>📷 QR Scan</h3>
<div id="reader"></div>

</div>

<!-- CARD -->
<div id="card" class="card">
  <h2 id="nama"></h2>
  <p id="jawatan"></p>
  <p>✔ HADIR</p>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <h3>✔ Berjaya Direkod</h3>
  <p id="pNama"></p>
  <p id="pJawatan"></p>
  <button onclick="closePopup()">OK</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzXxubDQOG7_51liomvqlP60s2fmckATmUF_ZpECMgQM_WKo_CFX_ZaNfN20_bTuIQ_KA/exec";

let scanner;
let lock=false;

/* SOUND */
function beep(){
  new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}

/* LOADING */
function showLoading(t){
  loadingText.innerText=t||"Loading...";
  loading.style.display="flex";
}
function hideLoading(){
  loading.style.display="none";
}

/* 👤 OPEN AHLI PAGE */
function openAhliPage(){
  showLoading("Membuka paparan ahli...");
  setTimeout(()=>{
    hideLoading();
    window.open("ahli.html","_blank");
  },700);
}

/* LOGIN */
function login(){

  showLoading("Login...");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      user:user.value,
      pass:pass.value
    })
  })
  .then(r=>r.json())
  .then(res=>{

    hideLoading();

    if(!res.success){
      alert("Login gagal");
      return;
    }

    loginBox.style.display="none";
    dashboard.style.display="block";

    startQR();

  });

}

/* QR */
function startQR(){

  scanner = new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10, qrbox:250},
    text=>{

      if(lock) return;
      lock=true;

      scanner.stop(); // STOP AUTO

      beep(); // SOUND

      fetch(API,{
        method:"POST",
        body:JSON.stringify({
          id:text,
          mesyuarat:mesyuarat.value,
          tempat:tempat.value,
          masa:masa.value
        })
      })
      .then(r=>r.json())
      .then(res=>{

        nama.innerText=res.nama;
        jawatan.innerText=res.jawatan;

        card.classList.add("show");
        setTimeout(()=>card.classList.remove("show"),2000);

        showPopup(res.nama,res.jawatan);

        reset();

      });

    }
  );

}

/* POPUP */
function showPopup(nama,jawatan){
  pNama.innerText="Nama: "+nama;
  pJawatan.innerText="Jawatan: "+jawatan;
  popup.classList.add("show");
}

function closePopup(){
  popup.classList.remove("show");
}

/* RESET */
function reset(){
  setTimeout(()=>{
    lock=false;
    startQR();
  },1200);
}

/* PDF */
function printPDF(){

  if(!tarikh.value){
    alert("Pilih tarikh");
    return;
  }

  showLoading("Menjana PDF...");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"pdf",
      tarikh:tarikh.value,
      mesyuarat:mesyuarat.value,
      tempat:tempat.value,
      masa:masa.value
    })
  })
  .then(r=>r.json())
  .then(res=>{
    hideLoading();
    window.open(res.url,"_blank");
  });

}

</script>

</body>
</html>
