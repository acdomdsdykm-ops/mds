<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MDS Kehadiran Mesyuarat</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5;}

.header{
  background:white;
  padding:10px;
  border-bottom:3px solid black;
}

.box{padding:10px;}

input,select,button{
  width:85%;
  padding:10px;
  margin:5px;
}

button{background:#2c3e50;color:white;}

#reader{background:white;padding:10px;border-radius:10px;}

.card{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0.5);
background:white;
padding:15px;
opacity:0;
transition:0.3s;
border-radius:10px;
}

.card.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

/* SIGN MODAL */
#signBox{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.sign{
background:white;
width:90%;
max-width:380px;
margin:80px auto;
padding:10px;
border-radius:10px;
}

#pad{
width:100%;
height:200px;
border:1px solid #ccc;
background:white;
touch-action:none;
}
</style>
</head>

<body>

<div class="header">
<h3>MAJLIS DAERAH SIMUNJAN</h3>
<h4>KEHADIRAN MESYUARAT</h4>
</div>

<!-- LOGIN -->
<div id="loginBox" class="box">
<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Pass">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dash" class="box" style="display:none;">

<select id="mesyuarat">
<option>Perlesenan</option>
<option>Pengurusan</option>
<option>Komuniti</option>
</select>

<div id="reader"></div>

<button onclick="printPDF()">Print PDF</button>

</div>

<!-- CARD -->
<div id="card" class="card">
<h3 id="nama"></h3>
<p id="jawatan"></p>
</div>

<!-- SIGN -->
<div id="signBox">
<div class="sign">
<h3>Tandatangan</h3>

<canvas id="pad"></canvas>

<button onclick="clearSig()">Clear</button>
<button onclick="saveSig()">Save</button>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzskbrHjdYGF_h3qnI79_GGH5_PRHMdSyAtlP0PgP3pVk3CfnNoueEu2nsIDrOzlDbfhQ/exec";

let scanner;
let current;
let scanLock = false;

/* ================= LOGIN (FIX DOM ERROR) ================= */
function login(){

fetch(`${API}?action=login&user=${user.value}&pass=${pass.value}`)
.then(r=>r.json())
.then(r=>{

if(r.success){

document.getElementById("loginBox").style.display="none";
document.getElementById("dash").style.display="block";

startQR();

}else{
alert("Login gagal");
}

});

}

/* ================= QR SCANNER ================= */
function startQR(){

scanner = new Html5Qrcode("reader");

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:200},

text=>{

if(scanLock) return;
scanLock = true;

fetch(`${API}?action=scan&id=${text}&mesyuarat=${mesyuarat.value}`)
.then(r=>r.json())
.then(r=>{

if(r.error){
alert(r.error);
scanLock=false;
return;
}

nama.innerText = r.nama;
jawatan.innerText = r.jawatan;

card.classList.add("show");

current = r;

/* WAJIB SIGN */
signBox.style.display="block";

setTimeout(()=>scanLock=false,1500);

});

});

}

/* ================= SIGNATURE FIX (MAIN FIX HERE) ================= */
const canvas = document.getElementById("pad");
const ctx = canvas.getContext("2d");

let drawing = false;

/* FIX CANVAS SCALE */
function resizeCanvas(){

const rect = canvas.getBoundingClientRect();
const ratio = window.devicePixelRatio || 1;

canvas.width = rect.width * ratio;
canvas.height = rect.height * ratio;

ctx.setTransform(ratio,0,0,ratio,0,0);

ctx.strokeStyle = "#000";
ctx.lineWidth = 2;
ctx.lineCap = "round";
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

/* GET POSITION FIX */
function pos(e){

const r = canvas.getBoundingClientRect();

return {
x:(e.clientX||e.touches[0].clientX)-r.left,
y:(e.clientY||e.touches[0].clientY)-r.top
};

}

/* DRAW START */
canvas.addEventListener("mousedown",e=>{
drawing=true;
let p=pos(e);
ctx.beginPath();
ctx.moveTo(p.x,p.y);
});

canvas.addEventListener("mousemove",e=>{
if(!drawing)return;
let p=pos(e);
ctx.lineTo(p.x,p.y);
ctx.stroke();
});

canvas.addEventListener("mouseup",()=>drawing=false);

/* TOUCH */
canvas.addEventListener("touchstart",e=>{
drawing=true;
let p=pos(e);
ctx.beginPath();
ctx.moveTo(p.x,p.y);
});

canvas.addEventListener("touchmove",e=>{
if(!drawing)return;
let p=pos(e);
ctx.lineTo(p.x,p.y);
ctx.stroke();
});

canvas.addEventListener("touchend",()=>drawing=false);

/* CLEAR */
function clearSig(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* SAVE SIGN */
function saveSig(){

const sign = canvas.toDataURL("image/png");

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"sign",
id:current.id,
sign:sign
})
}).then(()=>{

signBox.style.display="none";
clearSig();

alert("Signature disimpan");

});

}

/* ================= PDF ================= */
function printPDF(){

let t = prompt("Tarikh YYYY-MM-DD");

window.open(`${API}?action=pdf&mesyuarat=${mesyuarat.value}&tarikh=${t}`);

}

</script>

</body>
</html>
