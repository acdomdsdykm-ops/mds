<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran MDS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#f5f5f5;
  margin:0;
}

.letterhead{padding:12px 0;}
.logo{width:85px;}
.org-name{font-weight:bold;font-size:16px;}
.org-address{font-size:12px;color:#444;}

.panel{
  background:white;
  margin:12px;
  padding:18px;
  border-radius:12px;
  text-align:left;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

input,select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:5px;
}

button{
  width:90%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#3498db;
  color:white;
  cursor:pointer;
}
button:hover{background:#2980b9;}

#reader{width:300px;margin:auto;}

.card{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  opacity:0;
  transition:0.3s;
}
.card.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.popup{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  opacity:0;
  visibility:hidden;
}
.popup.show{opacity:1;visibility:visible;}

#bilBox,#programBox,#taklimatBox,#tempatLainBox{display:none;}

</style>
</head>

<body>

<div class="letterhead">
  <img class="logo" src="mds.png">
  <div class="org-name">MAJLIS DAERAH SIMUNJAN</div>
  <div class="org-address">Sistem Kehadiran Digital MDS</div>
</div>

<h3>🏢 Sistem Kehadiran MDS</h3>

<!-- LOGIN -->
<div id="loginBox">
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- QR AHLI (KEKAL) -->
<button onclick="openAhliPage()" style="background:#2ecc71;">
👤 Paparan QR Code Ahli Mesyuarat
</button>

<div id="dashboard" style="display:none;">

<div class="panel">

<label>Jenis Mesyuarat / Program</label>
<select id="jenisMesyuarat" onchange="toggleOptions()">

<option value="">-- Pilih --</option>

<option value="Jawatankuasa Kewangan" data-bil="1">Jawatankuasa Kewangan</option>
<option value="Jawatankuasa Perlesenan" data-bil="1">Jawatankuasa Perlesenan</option>
<option value="Jawatankuasa Pengurusan" data-bil="1">Jawatankuasa Pengurusan</option>

<option value="Perhimpunan Bulanan Staf" data-bil="0">Perhimpunan Bulanan Staf</option>
<option value="Taklimat Khas" data-bil="0">Taklimat Khas</option>
<option value="Program Komuniti" data-bil="0">Program Komuniti</option>

</select>

<!-- PROGRAM -->
<div id="programBox">
  <label>Nama Program Komuniti</label>
  <input id="namaProgram">
</div>

<!-- TAKLIMAT -->
<div id="taklimatBox">
  <label>Nama Taklimat Khas</label>
  <input id="namaTaklimat">
</div>

<!-- BIL -->
<div id="bilBox">
  <label>Bil Mesyuarat</label>
  <select id="bilMesyuarat">
    <option>Bil.1/2026</option>
    <option>Bil.2/2026</option>
    <option>Bil.3/2026</option>
    <option>Bil.4/2026</option>
  </select>
</div>

<label>Tarikh</label>
<input type="date" id="tarikh">

<label>Masa Mula</label>
<input type="time" id="masaMula">

<label>Masa Tamat</label>
<input type="time" id="masaTamat">

<label>Tempat</label>
<select id="tempat" onchange="toggleTempat(this.value)">
<option>Bilik Mesyuarat Utama</option>
<option>Bilik Jawatankuasa</option>
<option value="lain">Lain-lain</option>
</select>

<input id="tempatLainBox" placeholder="Lokasi lain">

<button onclick="printPDF()">🖨️ Print PDF</button>

</div>

<h3>📷 Scan QR</h3>
<div id="reader"></div>

</div>

<!-- CARD -->
<div id="card" class="card">
  <h2 id="nama"></h2>
  <p id="jawatan"></p>
  <p>✔ HADIR</p>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <h3>✔ Berjaya Direkod</h3>
  <p id="pNama"></p>
  <p id="pJawatan"></p>
  <button onclick="closePopup()">OK</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw2tjb-PMyznZktMQL2YMUG2-cbMXu1t0dtIzmCZ6pw9WU0kmHEAr_sojShtVlZ3vwoSw/exec";

let scanner;
let lock=false;

/* FIX DOM */
const user=document.getElementById("user");
const pass=document.getElementById("pass");
const loginBox=document.getElementById("loginBox");
const dashboard=document.getElementById("dashboard");
const nama=document.getElementById("nama");
const jawatan=document.getElementById("jawatan");
const popup=document.getElementById("popup");
const card=document.getElementById("card");

/* QR AHLI (KEKAL) */
function openAhliPage(){
  window.open("ahli.html","_blank");
}

/* TOGGLE */
function toggleOptions(){

  let s = jenisMesyuarat.options[jenisMesyuarat.selectedIndex];

  bilBox.style.display = s.getAttribute("data-bil")==="1"?"block":"none";
  programBox.style.display = (jenisMesyuarat.value==="Program Komuniti")?"block":"none";
  taklimatBox.style.display = (jenisMesyuarat.value==="Taklimat Khas")?"block":"none";
}

/* DATA */
function getMesyuaratFull(){

  let j = jenisMesyuarat.value;
  if(!j) return "";

  if(j==="Program Komuniti"){
    return j+" - "+(namaProgram.value||"");
  }

  if(j==="Taklimat Khas"){
    return j+" - "+(namaTaklimat.value||"");
  }

  let s = jenisMesyuarat.options[jenisMesyuarat.selectedIndex];

  return s.getAttribute("data-bil")==="1"
    ? j+" "+bilMesyuarat.value
    : j;
}

function getMasa(){
  return masaMula.value+" - "+masaTamat.value;
}

function toggleTempat(v){
  tempatLainBox.style.display = v==="lain"?"block":"none";
}

function getTempat(){
  return tempat.value==="lain"?tempatLainBox.value:tempat.value;
}

/* LOGIN */
function login(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({action:"login",user:user.value,pass:pass.value})
})
.then(r=>r.json())
.then(res=>{
if(!res.success){
alert("Login gagal");
return;
}
loginBox.style.display="none";
dashboard.style.display="block";
startQR();
});

}

/* QR */
function startQR(){

scanner=new Html5Qrcode("reader");

scanner.start({facingMode:"environment"},{fps:10,qrbox:250},text=>{

if(lock) return;
lock=true;

scanner.stop().catch(()=>{});

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
id:text,
mesyuarat:getMesyuaratFull(),
tempat:getTempat(),
masa:getMasa()
})
});

setTimeout(()=>{
lock=false;
startQR();
},1500);

});

}

/* POPUP */
function showPopup(n,j){
document.getElementById("pNama").innerText=n||"-";
document.getElementById("pJawatan").innerText=j||"-";
popup.classList.add("show");
}

function closePopup(){
popup.classList.remove("show");
}

/* PDF */
function printPDF(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
action:"pdf",
tarikh:tarikh.value,
mesyuarat:getMesyuaratFull(),
tempat:getTempat(),
masa:getMasa()
})
})
.then(r=>r.json())
.then(res=>{
if(res.url){
window.open(res.url,"_blank");
}else{
alert("PDF gagal");
}
});

}

</script>

</body>
</html>
