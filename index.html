<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Staf MDS</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

/* HEADER */
.logo {
  width: 90px;
  margin: 10px auto;
  display: block;
}

.school-name {
  font-size: 18px;
  font-weight: bold;
}

.school-sub {
  font-size: 12px;
  color: #555;
}

/* UI */
.box { display:none; padding:10px; }

input, select, button {
  padding:12px;
  width:85%;
  margin:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#3498db;
  color:white;
  border:none;
}

/* QR */
#reader {
  width:300px;
  margin:auto;
}

/* RESULT */
#result {
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}

.success { color:green; }
.error { color:red; }

/* CARD */
.card {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  width: 280px;
  opacity: 0;
  transition: 0.3s;
  z-index: 9999;
}

.card.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.badge {
  display:inline-block;
  margin-top:10px;
  padding:5px 10px;
  background:#2ecc71;
  color:white;
  border-radius:20px;
}

/* LOADING */
.overlay {
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  z-index:9999;
}

.spinner {
  width:50px;height:50px;
  border:5px solid #ccc;
  border-top:5px solid #3498db;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- HEADER -->
<img class="logo" src="mds.png">
<div class="school-name">MAJLIS DAERAH SIMUNJAN</div>
<div class="school-sub">Sistem Kehadiran Staf Rasmi</div>

<h2>🏢 Kehadiran Staf MDS</h2>

<!-- DROPDOWN MESYUARAT -->
<h3>📅 Pilih Mesyuarat</h3>
<select id="mesyuarat">
  <option value="Perlesenan">Jawatankuasa Perlesenan</option>
  <option value="Pengurusan">Jawatankuasa Pengurusan</option>
</select>

<!-- LOGIN (optional simple) -->
<div id="loginBox" class="box" style="display:block;">
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">

  <h3>📷 Scan QR Staf</h3>
  <div id="reader"></div>

  <p id="result"></p>

</div>

<!-- CARD -->
<div id="card" class="card">
  <h2 id="nama"></h2>
  <p id="jawatan"></p>
  <div class="badge">✔ HADIR</div>
</div>

<!-- LOADING -->
<div id="loading" class="overlay">
  <div class="spinner"></div>
  <p>Loading...</p>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxQZGfqo9_DmjhxCN6AN3LrYZKJFplHrrRRNp3u4AjdoNf7z7OTdnRcwKtTOBbs7YDoKQ/exec";

let scanner;
let lock=false;

/* LOGIN SIMPLE */
function login(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("dashboard").style.display="block";
  startQR();
}

/* START QR */
function startQR(){
  scanner = new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10, qrbox:250},
    text => {

      if(lock) return;
      lock = true;

      let mesyuarat = document.getElementById("mesyuarat").value;

      fetch(API,{
        method:"POST",
        body:JSON.stringify({
          id:text,
          mesyuarat:mesyuarat
        })
      })
      .then(r=>r.json())
      .then(res=>{

        if(res.status==="duplicate"){
          showResult("❌ Sudah scan hari ini","error");
          reset();
          return;
        }

        showResult("✅ "+res.nama+" ("+res.jawatan+")","success");

        showCard(res.nama, res.jawatan);

        new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
        if(navigator.vibrate) navigator.vibrate([200,100,200]);

        reset();
      });

    }
  );
}

/* RESULT */
function showResult(msg,type){
  let r=document.getElementById("result");
  r.innerText=msg;
  r.className=type;
}

/* CARD */
function showCard(nama,jawatan){
  document.getElementById("nama").innerText=nama;
  document.getElementById("jawatan").innerText="Jawatan: "+jawatan;

  let c=document.getElementById("card");
  c.classList.add("show");

  setTimeout(()=>c.classList.remove("show"),2500);
}

/* RESET */
function reset(){
  setTimeout(()=>lock=false,1200);
}

</script>

</body>
</html>
