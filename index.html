<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran MDS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#064e3b,#022c22);
  color:white;
}

.letterhead{padding:12px 0;}
.logo{width:85px;}
.org-name{font-weight:bold;font-size:16px;}
.org-address{font-size:12px;color:#d1d5db;}

.panel{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  margin:12px auto;
  padding:20px;
  border-radius:14px;
  max-width:340px;
}

input,select{
  width:95%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:8px;
}

button{
  width:95%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#10b981,#059669);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#reader{width:300px;margin:auto;}

#statusScan{
  margin-top:10px;
  font-weight:bold;
  color:#a7f3d0;
}

.popup{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.96);
  border-radius:18px;
  padding:25px;
  width:280px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  opacity:0;
  visibility:hidden;
}

.popup.show{
  opacity:1;
  visibility:visible;
}

#errorMsg{
  color:#ffb4b4;
  font-size:13px;
  margin-top:8px;
}

.manualBox{display:none;margin-top:8px;}

</style>
</head>

<body>

<audio id="beepSound"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<div class="letterhead">
  <img class="logo" src="mds.png">
  <div class="org-name">MAJLIS DAERAH SIMUNJAN</div>
  <div class="org-address">Sistem Kehadiran Digital MDS</div>
</div>

<h3>🏢 SISTEM KEHADIRAN MDS</h3>

<!-- LOGIN -->
<div id="loginBox" class="panel">

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="loginError" style="color:#ffb4b4;font-size:13px;"></div>

</div>

<!-- QR STAFF -->
<button onclick="openQRStaf()" style="width:95%;max-width:340px;background:linear-gradient(135deg,#3b82f6,#2563eb);">
👤 QRCode Staff
</button>

<div id="dashboard" style="display:none;">

<div class="panel">

<label>Jenis Mesyuarat / Program</label>
<select id="jenisMesyuarat" onchange="toggleOptions()">

<option value="">-- Pilih --</option>
<option value="Jawatankuasa Kewangan">Jawatankuasa Kewangan</option>
<option value="Jawatankuasa Perlesenan">Jawatankuasa Perlesenan</option>
<option value="Jawatankuasa Pengurusan">Jawatankuasa Pengurusan</option>
<option value="Program Komuniti">Program Komuniti</option>
<option value="Taklimat Khas">Taklimat Khas</option>

</select>

<!-- MANUAL -->
<div id="programBox" class="manualBox">
<input id="namaProgram" placeholder="Nama Program">
</div>

<div id="taklimatBox" class="manualBox">
<input id="namaTaklimat" placeholder="Nama Taklimat">
</div>

<div id="layer2Box" class="manualBox">
<select id="bilMesyuarat">
<option>Bil.1/2026</option>
<option>Bil.2/2026</option>
<option>Bil.3/2026</option>
<option>Bil.4/2026</option>
</select>
</div>

<label>Tarikh</label>
<input type="date" id="tarikh">

<label>Masa Mula</label>
<input type="time" id="masaMula">

<label>Masa Tamat</label>
<input type="time" id="masaTamat">

<label>Tempat</label>
<select id="tempat">
<option>Bilik Mesyuarat Utama</option>
<option>Bilik Jawatankuasa</option>
</select>

<button onclick="startQR()">📷 START SCAN</button>

<div id="statusScan">🟢 Sedia untuk scan</div>

</div>

<h3>📷 SCAN QR</h3>
<div id="reader"></div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">

<div style="font-size:40px;">🎉</div>

<h3 style="color:#047857;">KEHADIRAN BERJAYA</h3>

<p id="pNama" style="font-weight:bold;"></p>
<p id="pJawatan" style="color:#555;"></p>

</div>

<script>

let scanner;
let lock=false;
let scannedList=[];

const beep=document.getElementById("beepSound");

/* 🔐 LOGIN FROM SHEET */
function login(){

fetch("https://script.google.com/macros/s/AKfycbw1SU1rXicE1HD917ii3pwucNxsSvute4VAj4bm1cZqXp2fWa3VOilA0AqbatWflINMHA/exec",{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
action:"login",
user:user.value,
pass:pass.value
})
})
.then(r=>r.json())
.then(res=>{

if(res.success){
loginBox.style.display="none";
dashboard.style.display="block";
}else{
loginError.innerText="Login gagal. Sila cuba lagi.";
}

});

}

/* QR STAFF */
function openQRStaf(){
window.open("ahli.html","_blank");
}

/* TOGGLE */
function toggleOptions(){

programBox.style.display="none";
taklimatBox.style.display="none";
layer2Box.style.display="none";

if(jenisMesyuarat.value==="Program Komuniti"){
programBox.style.display="block";
}

if(jenisMesyuarat.value==="Taklimat Khas"){
taklimatBox.style.display="block";
}

if(jenisMesyuarat.value.includes("Jawatankuasa")){
layer2Box.style.display="block";
}

}

/* SCAN */
function startQR(){

scanner=new Html5Qrcode("reader");

scanner.start({facingMode:"environment"},{fps:10,qrbox:250},text=>{

if(lock) return;
lock=true;

if(scannedList.includes(text)){
lock=false;
return;
}

scannedList.push(text);

scanner.stop().catch(()=>{});

fetch("https://script.google.com/macros/s/AKfycbw1SU1rXicE1HD917ii3pwucNxsSvute4VAj4bm1cZqXp2fWa3VOilA0AqbatWflINMHA/exec",{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
id:text,
mesyuarat:jenisMesyuarat.value,
program:namaProgram.value||"",
taklimat:namaTaklimat.value||"",
bil:bilMesyuarat.value||"",
tempat:tempat.value,
masa:masaMula.value+"-"+masaTamat.value
})
})
.then(r=>r.json())
.then(res=>{

beep.play();

pNama.innerText="Nama: "+(res.nama||"Tiada Data");
pJawatan.innerText="Jawatan: "+(res.jawatan||"Tiada Data");

popup.classList.add("show");

setTimeout(()=>{

popup.classList.remove("show");
lock=false;
startQR();

},1800);

});

});

}

</script>

</body>
</html>
