<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran MDS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#064e3b,#022c22);
  color:white;
}

.letterhead{padding:12px 0;}
.logo{width:85px;}
.org-name{font-weight:bold;font-size:16px;}
.org-address{font-size:12px;color:#d1d5db;}

.panel{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  margin:12px auto;
  padding:20px;
  border-radius:14px;
  max-width:340px;
}

input,select{
  width:95%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:8px;
  outline:none;
}

button{
  width:95%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#10b981,#059669);
  color:white;
  font-weight:bold;
}

#reader{width:300px;margin:auto;}

#statusScan{
  margin-top:10px;
  font-weight:bold;
  color:#a7f3d0;
}

.popup{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.96);
  border-radius:18px;
  padding:25px;
  width:280px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  opacity:0;
  visibility:hidden;
  z-index:99999;
}

.popup.show{
  opacity:1;
  visibility:visible;
}

#errorMsg{
  color:#ffb4b4;
  font-size:13px;
  margin-top:8px;
}

</style>
</head>

<body>

<audio id="beepSound"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<div class="letterhead">
  <img class="logo" src="mds.png">
  <div class="org-name">MAJLIS DAERAH SIMUNJAN</div>
  <div class="org-address">Sistem Kehadiran Digital MDS</div>
</div>

<h3>🏢 SISTEM KEHADIRAN MDS</h3>

<!-- LOGIN -->
<div id="loginBox" class="panel">
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- 🔵 NEW BUTTON QR STAFF -->
<button onclick="openQRStaf()" style="
width:95%;
max-width:340px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
">
👤 Paparan QRCode Staf
</button>

<div id="dashboard" style="display:none;">

<div class="panel">

<label>Jenis Mesyuarat / Program</label>
<select id="jenisMesyuarat">
<option value="">-- Pilih --</option>
<option value="Jawatankuasa Kewangan">Jawatankuasa Kewangan</option>
<option value="Jawatankuasa Perlesenan">Jawatankuasa Perlesenan</option>
<option value="Jawatankuasa Pengurusan">Jawatankuasa Pengurusan</option>
<option value="Perhimpunan Bulanan Staf">Perhimpunan Bulanan Staf</option>
<option value="Taklimat Khas">Taklimat Khas</option>
<option value="Program Komuniti">Program Komuniti</option>
</select>

<label>Tarikh</label>
<input type="date" id="tarikh">

<label>Masa Mula</label>
<input type="time" id="masaMula">

<label>Masa Tamat</label>
<input type="time" id="masaTamat">

<label>Tempat</label>
<select id="tempat">
<option>Bilik Mesyuarat Utama</option>
<option>Bilik Jawatankuasa</option>
</select>

<div id="errorMsg"></div>

<button onclick="startQR()">📷 START SCAN</button>

<div id="statusScan">🟢 Sedia untuk scan</div>

</div>

<h3>📷 SCAN QR</h3>
<div id="reader"></div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">

<div style="font-size:40px;">🎉</div>

<h3 style="color:#047857;">KEHADIRAN BERJAYA</h3>

<p id="pNama" style="font-weight:bold;"></p>
<p id="pJawatan" style="color:#555;"></p>

<div style="margin-top:10px;padding:8px;background:#dcfce7;border-radius:10px;color:#065f46;font-size:12px;font-weight:bold;">
✔ Kehadiran direkodkan
</div>

</div>

<script>

let scanner;
let lock=false;
let scannedList=[];

const beep=document.getElementById("beepSound");

/* LOGIN */
function login(){
loginBox.style.display="none";
dashboard.style.display="block";
}

/* OPEN QR STAFF PAGE */
function openQRStaf(){

let url = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=MDS-STAF-QR";

window.open(url,"_blank");

}

/* START SCAN */
function startQR(){

document.getElementById("statusScan").innerText="📡 Scanning in progress...";

scanner=new Html5Qrcode("reader");

scanner.start({facingMode:"environment"},{fps:10,qrbox:250},text=>{

if(lock) return;
lock=true;

document.getElementById("statusScan").innerText="⚙️ Processing...";

if(scannedList.includes(text)){
document.getElementById("statusScan").innerText="🔴 Duplicate scan detected";
lock=false;
return;
}

scannedList.push(text);

scanner.stop().catch(()=>{});

fetch("https://script.google.com/macros/s/AKfycbw1SU1rXicE1HD917ii3pwucNxsSvute4VAj4bm1cZqXp2fWa3VOilA0AqbatWflINMHA/exec",{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
id:text,
mesyuarat:jenisMesyuarat.value,
tempat:tempat.value,
masa:masaMula.value+"-"+masaTamat.value
})
})
.then(r=>r.json())
.then(res=>{

beep.play();

let nama = res.nama || "Tidak Dikenal";
let jawatan = res.jawatan || "Tidak Dikenal";

document.getElementById("pNama").innerText="Nama: "+nama;
document.getElementById("pJawatan").innerText="Jawatan: "+jawatan;

document.getElementById("statusScan").innerText="🟢 Attendance recorded successfully";

popup.classList.add("show");

setTimeout(()=>{

popup.classList.remove("show");
document.getElementById("statusScan").innerText="🟢 Sedia untuk scan";

lock=false;
startQR();

},1800);

});

});

}

</script>

</body>
</html>
