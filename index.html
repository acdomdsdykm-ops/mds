<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran MDS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

/* 🌿 BACKGROUND HIJAU TUA FULL SCREEN */
body{
  font-family:Arial;
  text-align:center;
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#064e3b,#022c22);
  color:white;
}

/* LETTERHEAD */
.letterhead{padding:12px 0;}
.logo{width:85px;}
.org-name{font-weight:bold;font-size:16px;}
.org-address{font-size:12px;color:#d1d5db;}

/* PANEL */
.panel{
  background:white;
  color:black;
  margin:12px;
  padding:18px;
  border-radius:12px;
  text-align:left;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* INPUT */
input,select{
  width:98%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:5px;
}

button{
  width:99%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#3498db;
  color:white;
  cursor:pointer;
}

button:hover{background:#2980b9;}

/* QR SCANNER */
#reader{width:300px;margin:auto;}

/* POPUP */
.popup{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:white;
  color:black;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  opacity:0;
  visibility:hidden;
  z-index:99999;
}

.popup.show{
  opacity:1;
  visibility:visible;
}

/* HIDE BOX */
#bilBox,#programBox,#taklimatBox,#tempatLainBox{display:none;}

</style>
</head>

<body>

<!-- SOUND -->
<audio id="beepSound"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<div class="letterhead">
  <img class="logo" src="mds.png">
  <div class="org-name">MAJLIS DAERAH SIMUNJAN</div>
  <div class="org-address">Sistem Kehadiran Digital MDS</div>
</div>

<h3>🏢 Sistem Kehadiran MDS</h3>

<!-- LOGIN -->
<div id="loginBox" class="panel">
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- QR AHLI -->
<button onclick="openAhliPage()" style="background:#2ecc71;">
👤 Paparan QR Code Ahli Mesyuarat
</button>

<div id="dashboard" style="display:none;">

<div class="panel">

<label>Jenis Mesyuarat / Program</label>
<select id="jenisMesyuarat" onchange="toggleOptions()">

<option value="">-- Pilih --</option>

<option value="Mesyuarat Penuh" data-bil="1">Mesyuarat Penuh</option>
<option value="JK Pelesenan, Kesihatan Awam dan Kawalan Penjaja" data-bil="1">JK Pelesenan, Kesihatan Awam dan Kawalan Penjaja</option>
<option value="JK Pembangunan Komuniti, Alam Sekitar dan Pelancongan" data-bil="1">JK Pembangunan Komuniti, Alam Sekitar dan Pelancongan</option>
<option value="JK Perancangan, Pembangunan dan Kerja Awam" data-bil="1">JK Perancangan, Pembangunan dan Kerja Awam</option>
<option value="JK Kewangan, Pengurusan Sumber dan Tujuan Am" data-bil="1">JK Kewangan, Pengurusan Sumber dan Tujuan Am</option>
<option value="JK Kecil Pelan Bangunan" data-bil="1">JK Kecil Pelan Bangunan</option>
<option value="JK Kecil Pelesenan, Gerai Makan Minum" data-bil="1">JK Kecil Pelesenan, Gerai Makan Minum</option>
<option value="JK Tender" data-bil="1">JK Tender</option>
<option value="JK Pengurusan Aset Alih Kerajaan (JKPAK)" data-bil="1">JK Pengurusan Aset Alih Kerajaan (JKPAK)</option>
<option value="JK Unit Pengurusan Aset (UPA)" data-bil="1">JK Unit Pengurusan Aset (UPA)</option>
<option value="JK Anti Rasuah (JAR)" data-bil="1">JK Anti Rasuah (JAR)</option>
<option value="JK Unit Integriti (UI)" data-bil="1">JK Unit Integriti (UI)</option>
<option value="JK Keselamatan dan Kesihatan Pekerja" data-bil="1">JK Keselamatan dan Kesihatan Pekerja</option>
<option value="JK SCS Balance Scorecard (BSC))" data-bil="1">JK SCS Balance Scorecard (BSC))</option>
<option value="JK Pengurusan Aduan" data-bil="1">JK Pengurusan Aduan</option>
<option value="Mesyuarat Sistem Penarafan Bintang Pihak Berkuasa Tempatan(SPB-PBT)" data-bil="1">Mesyuarat Sistem Penarafan Bintang Pihak Berkuasa Tempatan(SPB-PBT)</option>
<option value="Mesyuarat eCSA" data-bil="1">Mesyuarat eCSA</option>


<option value="Perhimpunan Bulanan Staf" data-bil="0">Perhimpunan Bulanan Staf</option>
<option value="Taklimat Khas" data-bil="0">Taklimat Khas</option>
<option value="Program Komuniti" data-bil="0">Program Komuniti</option>

</select>

<div id="programBox">
  <label>Nama Program</label>
  <input id="namaProgram">
</div>

<div id="taklimatBox">
  <label>Nama Taklimat</label>
  <input id="namaTaklimat">
</div>

<div id="bilBox">
  <label>Bil Mesyuarat</label>
  <select id="bilMesyuarat">
    <option>Bil.1/2026</option>
    <option>Bil.2/2026</option>
    <option>Bil.3/2026</option>
    <option>Bil.4/2026</option>
    <option>Bil.5/2026</option>
    <option>Bil.6/2026</option>
  </select>
</div>

<label>Tarikh</label>
<input type="date" id="tarikh">

<label>Masa Mula</label>
<input type="time" id="masaMula">

<label>Masa Tamat</label>
<input type="time" id="masaTamat">

<label>Tempat</label>
<select id="tempat">
<option>Bilik Mesyuarat Utama</option>
<option>Bilik Jawatankuasa</option>
<option value="lain">Lain-lain</option>
</select>

<input id="tempatLainBox" placeholder="Lokasi lain">

<button onclick="printPDF()">🖨️ Print PDF</button>

</div>

<h3>📷 Scan QR</h3>
<div id="reader"></div>

<button onclick="switchCamera()">🔄 Tukar Kamera</button>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <h3>✔ SCAN BERJAYA</h3>
  <p id="pNama"></p>
  <p id="pJawatan"></p>
  <button onclick="closePopup()">OK</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwUfYEUShEnVyld8GIeQTeY3STUDHvwK8QsIqah2D1vFNoup7NMupjsYh-z-6CExH75PA/exec";

let scanner;
let lock=false;

const beep=document.getElementById("beepSound");

/* OPEN AHLI */
function openAhliPage(){
  window.open("ahli.html","_blank");
}

/* TOGGLE */
function toggleOptions(){

  let s = jenisMesyuarat.options[jenisMesyuarat.selectedIndex];

  bilBox.style.display = s.getAttribute("data-bil")==="1"?"block":"none";
  programBox.style.display = (jenisMesyuarat.value==="Program Komuniti")?"block":"none";
  taklimatBox.style.display = (jenisMesyuarat.value==="Taklimat Khas")?"block":"none";
}

/* MESYUARAT */
function getMesyuaratFull(){

  let j = jenisMesyuarat.value;
  if(!j) return "";

  if(j==="Program Komuniti"){
    return j+" - "+(namaProgram.value||"");
  }

  if(j==="Taklimat Khas"){
    return j+" - "+(namaTaklimat.value||"");
  }

  let s = jenisMesyuarat.options[jenisMesyuarat.selectedIndex];

  return s.getAttribute("data-bil")==="1"
    ? j+" "+bilMesyuarat.value
    : j;
}

/* LOGIN */
function login(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({action:"login",user:user.value,pass:pass.value})
})
.then(r=>r.json())
.then(res=>{
if(!res.success){
alert("Login gagal");
return;
}
loginBox.style.display="none";
dashboard.style.display="block";
startQR();
});

}

/* QR SCAN */
function startQR(){

scanner=new Html5Qrcode("reader");

scanner.start({facingMode:"user"},{fps:10,qrbox:250},text=>{

if(lock) return;
lock=true;

scanner.stop().catch(()=>{});

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
id:text,
mesyuarat:getMesyuaratFull(),
tempat:tempat.value,
masa:masaMula.value+" - "+masaTamat.value
})
})
.then(r=>r.json())
.then(res=>{

beep.play();

if(navigator.vibrate){
navigator.vibrate(300);
}

let speech = new SpeechSynthesisUtterance(
"Nama " + res.nama + ". Jawatan " + res.jawatan
);
speech.lang="ms-MY";
speechSynthesis.speak(speech);

document.getElementById("pNama").innerText="Nama: "+res.nama;
document.getElementById("pJawatan").innerText="Jawatan: "+res.jawatan;
popup.classList.add("show");

setTimeout(()=>{
popup.classList.remove("show");
lock=false;
startQR();
},1800);

});

});

}

let currentCam = "environment";

function switchCamera(){
  scanner.stop().then(()=>{
    currentCam = currentCam === "environment" ? "user" : "environment";

    scanner.start(
      { facingMode: currentCam },
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );
  });
}

/* CLOSE POPUP */
function closePopup(){
popup.classList.remove("show");
}

/* PRINT */
function printPDF(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
action:"pdf",
tarikh:tarikh.value,
mesyuarat:getMesyuaratFull(),
tempat:tempat.value,
masa:masaMula.value+" - "+masaTamat.value
})
})
.then(r=>r.json())
.then(res=>{
if(res.url){
window.open(res.url,"_blank");
}else{
alert("PDF gagal dijana");
}
});

}

</script>

</body>
</html>
