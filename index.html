<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MDS KEHADIRAN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5;}
.box{padding:10px;}
input,select,button{width:85%;padding:10px;margin:5px;}
button{background:#2c3e50;color:white;}

#reader{background:white;padding:10px;border-radius:10px;}

#signBox{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.sign{
background:white;
width:90%;
max-width:350px;
margin:80px auto;
padding:10px;
}

canvas{
width:100%;
height:180px;
border:1px solid #ccc;
background:white;
touch-action:none;
}
</style>
</head>

<body>

<h3>MDS KEHADIRAN</h3>

<!-- LOGIN -->
<div id="login" class="box">
<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Pass">
<button onclick="login()">Login</button>
</div>

<!-- DASH -->
<div id="dash" class="box" style="display:none;">

<select id="mesyuarat">
<option>Perlesenan</option>
<option>Pengurusan</option>
<option>Komuniti</option>
</select>

<div id="reader"></div>

<button onclick="pdf()">PDF</button>

</div>

<!-- SIGN -->
<div id="signBox">
<div class="sign">

<h3>Tandatangan</h3>
<canvas id="pad"></canvas>

<button onclick="clearSig()">Clear</button>
<button onclick="saveSig()">Save</button>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzskbrHjdYGF_h3qnI79_GGH5_PRHMdSyAtlP0PgP3pVk3CfnNoueEu2nsIDrOzlDbfhQ/exec";

let scanner;
let current;
let draw = false;

/* LOGIN */
function login(){

fetch(`${API}?action=login&user=${user.value}&pass=${pass.value}`)
.then(r=>r.json())
.then(res=>{

if(res.success){

document.getElementById("login").style.display = "none";
document.getElementById("dash").style.display = "block";

startQR();

}else{

alert("Login gagal");

}

});

}

/* QR */
function startQR(){

scanner = new Html5Qrcode("reader");

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:200},

text=>{

fetch(`${API}?action=scan&id=${text}&mesyuarat=${mesyuarat.value}`)
.then(r=>r.json())
.then(r=>{

if(r.error){
alert(r.error);
return;
}

current = r;

/* SHOW SIGN */
signBox.style.display="block";

});

});

}

/* SIGN FIX */
const canvas = document.getElementById("pad");
const ctx = canvas.getContext("2d");

function fix(){
canvas.width = canvas.offsetWidth;
canvas.height = 180;
ctx.strokeStyle="#000";
ctx.lineWidth=2;
}
fix();

canvas.onmousedown=e=>{
draw=true;
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
};

canvas.onmouseup=()=>draw=false;

canvas.onmousemove=e=>{
if(!draw)return;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
};

/* CLEAR */
function clearSig(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* SAVE */
function saveSig(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"sign",
id:current.id,
sign:canvas.toDataURL()
})
}).then(()=>{

signBox.style.display="none";
clearSig();

});

}

/* PDF */
function pdf(){
let t = prompt("YYYY-MM-DD");
window.open(`${API}?action=pdf&mesyuarat=${mesyuarat.value}&tarikh=${t}`);
}

</script>

</body>
</html>
