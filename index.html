<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kehadiran Staf MDS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#f5f5f5;
}

/* LETTERHEAD */
.letterhead{
  text-align:center;
  margin:10px 0;
}

.logo{
  width:90px;
  display:block;
  margin:auto;
}

.org-name{
  font-weight:bold;
  font-size:16px;
}

.org-address{
  font-size:12px;
  color:#333;
}

/* FORM */
input,select,button{
  width:90%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#2980b9;
}

/* PANEL */
.panel{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:10px;
  text-align:left;
}

label{
  font-weight:bold;
  display:block;
  margin-top:10px;
}

/* QR */
#reader{
  width:300px;
  margin:auto;
}

/* CARD */
.card{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  opacity:0;
  transition:0.3s;
}

.card.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

/* RESULT */
.success{color:green;}
.error{color:red;}

/* LOADING OVERLAY */
.loading{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
  color:white;
}

.spinner{
  width:55px;
  height:55px;
  border:5px solid #ccc;
  border-top:5px solid #2ecc71;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="spinner"></div>
  <p id="loadingText">Loading...</p>
</div>

<!-- LETTERHEAD -->
<div class="letterhead">
  <img class="logo" src="mds.png">
  <div class="org-name">MAJLIS DAERAH SIMUNJAN</div>
  <div class="org-address">
    Lot 805, Gunong Ngeli New Service Centre,<br>
    94800 Simunjan, Sarawak
  </div>
</div>

<h2>🏢 Sistem Kehadiran Staf MDS</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- BUTTON AHLI -->
<button onclick="openAhliPage()" style="background:#2ecc71;width:90%;">
👤 Paparan QR Code Ahli Mesyuarat
</button>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="panel">

<h3>⚙️ Kawalan Mesyuarat</h3>

<label>Jenis Mesyuarat</label>
<select id="mesyuarat">
  <option>Perlesenan</option>
  <option>Pengurusan</option>
</select>

<label>Tarikh</label>
<input type="date" id="tarikh">

<label>Masa</label>
<select id="masa">
  <option>9.00am - 12.00pm</option>
  <option>2.30pm - 5.00pm</option>
</select>

<label>Tempat</label>
<select id="tempat">
  <option>Bilik Mesyuarat Utama, MDS</option>
  <option>Bilik Jawatankuasa MDS</option>
</select>

<button onclick="printPDF()">🖨️ Print PDF Kehadiran</button>

</div>

<h3>📷 Scan QR</h3>
<div id="reader"></div>
<p id="result"></p>

</div>

<!-- CARD -->
<div id="card" class="card">
  <h2 id="nama"></h2>
  <p id="jawatan"></p>
  <p>✔ HADIR</p>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz5qjcFfZGoggDneb4Yp05XBgctUumR0qZT_OttSUHQDqjO_PUInodVcTu7Nr2T61_Ftg/exec";

let scanner;
let lock=false;

/* ================= LOADING ================= */
function showLoading(text){
  document.getElementById("loadingText").innerText = text || "Loading...";
  document.getElementById("loading").style.display = "flex";
}

function hideLoading(){
  document.getElementById("loading").style.display = "none";
}

/* ================= OPEN AHLI ================= */
function openAhliPage(){

  showLoading("Membuka paparan ahli...");

  setTimeout(()=>{
    hideLoading();
    window.open("ahli.html","_blank");
  },800);

}

/* ================= LOGIN ================= */
function login(){

  showLoading("Semak login...");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      user:user.value,
      pass:pass.value
    })
  })
  .then(r=>r.json())
  .then(res=>{

    hideLoading();

    if(!res.success){
      alert("Login gagal");
      return;
    }

    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    startQR();

  });

}

/* ================= QR ================= */
function startQR(){

  scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    text=>{

      if(lock) return;
      lock=true;

      fetch(API,{
        method:"POST",
        body:JSON.stringify({
          id:text,
          mesyuarat:mesyuarat.value,
          tempat:tempat.value,
          masa:masa.value
        })
      })
      .then(r=>r.json())
      .then(res=>{

        nama.innerText=res.nama;
        jawatan.innerText=res.jawatan;

        card.classList.add("show");

        setTimeout(()=>card.classList.remove("show"),2500);

        new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();

        reset();

      });

    }
  );

}

/* ================= RESET ================= */
function reset(){
  setTimeout(()=>lock=false,1000);
}

/* ================= PDF ================= */
function printPDF(){

  if(!tarikh.value){
    alert("Pilih tarikh");
    return;
  }

  showLoading("Menjana PDF rasmi...");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"pdf",
      tarikh:tarikh.value,
      mesyuarat:mesyuarat.value,
      tempat:tempat.value,
      masa:masa.value
    })
  })
  .then(r=>r.json())
  .then(res=>{

    hideLoading();
    window.open(res.url,"_blank");

  });

}

</script>

</body>
</html>
