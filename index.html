<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kehadiran Staf MDS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#f5f5f5;
}

.logo{width:90px;margin:10px auto;}

.box{display:none;}

input,select,button{
  width:90%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#2980b9;
}

#reader{width:300px;margin:auto;}

#result{font-weight:bold;}

.success{color:green;}
.error{color:red;}

/* CARD */
.card{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  opacity:0;
  transition:0.3s;
}

.card.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

/* LOADING */
#loading{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  color:white;
  align-items:center;
  justify-content:center;
}

/* CONTROL PANEL */
.panel{
  background:white;
  padding:15px;
  border-radius:10px;
  margin:10px;
  text-align:left;
}

.panel h3{
  text-align:center;
}

label{
  display:block;
  font-weight:bold;
  margin-top:10px;
  text-align:left;
}
</style>
</head>

<body>

<img class="logo" src="mds.png">
<h2>🏢 Sistem Kehadiran Staf MDS</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">

  <!-- CONTROL PANEL -->
  <div id="controlPanel" class="panel" style="display:none;">

    <h3>⚙️ Kawalan Mesyuarat</h3>

    <label>Jenis Mesyuarat</label>
    <select id="mesyuarat">
      <option value="Perlesenan">Jawatankuasa Perlesenan</option>
      <option value="Pengurusan">Jawatankuasa Pengurusan</option>
    </select>

    <label>Tarikh Mesyuarat</label>
    <input type="date" id="tarikh">

    <label>Masa Mesyuarat</label>
    <select id="masa">
      <option value="9.00am - 12.00pm">9.00am - 12.00pm</option>
      <option value="2.30pm - 5.00pm">2.30pm - 5.00pm</option>
    </select>

    <label>Tempat Mesyuarat</label>
    <select id="tempat">
      <option value="Bilik Mesyuarat Utama, MDS">Bilik Mesyuarat Utama, MDS</option>
      <option value="Bilik Jawatankuasa MDS">Bilik Jawatankuasa MDS</option>
    </select>

    <button onclick="printPDF()">🖨️ Print PDF Kehadiran</button>

  </div>

  <h3>📷 Scan QR Staf</h3>
  <div id="reader"></div>

  <p id="result"></p>

</div>

<!-- CARD -->
<div id="card" class="card">
  <h2 id="nama"></h2>
  <p id="jawatan"></p>
  <p>✔ HADIR</p>
</div>

<!-- LOADING -->
<div id="loading">Loading...</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyKVq2NrDh1TGOWVykNAB35FqeFweqk0OiKrKj2JWFn2qknS8dV33O1KIVwiPSuaglPkA/exec";

let scanner, lock=false;

/* LOGIN */
function login(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("dashboard").style.display="block";
  document.getElementById("controlPanel").style.display="block";
  startQR();
}

/* QR */
function startQR(){
  scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    text=>{

      if(lock) return;
      lock=true;

      fetch(API,{
        method:"POST",
        body:JSON.stringify({
          id:text,
          mesyuarat:mesyuaratValue(),
          tempat:tempatValue(),
          masa:masaValue()
        })
      })
      .then(r=>r.json())
      .then(res=>{

        if(res.status==="duplicate"){
          showResult("❌ Sudah scan","error");
          reset();
          return;
        }

        showResult("✅ "+res.nama,"success");
        showCard(res.nama,res.jawatan);

        new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();

        if(navigator.vibrate) navigator.vibrate(200);

        reset();
      });

    }
  );
}

/* VALUES */
function mesyuaratValue(){return document.getElementById("mesyuarat").value;}
function tempatValue(){return document.getElementById("tempat").value;}
function masaValue(){return document.getElementById("masa").value;}

/* RESULT */
function showResult(m,t){
  let r=document.getElementById("result");
  r.innerText=m;
  r.className=t;
}

/* CARD */
function showCard(n,j){
  document.getElementById("nama").innerText=n;
  document.getElementById("jawatan").innerText=j;

  let c=document.getElementById("card");
  c.classList.add("show");

  setTimeout(()=>c.classList.remove("show"),2500);
}

/* RESET */
function reset(){
  setTimeout(()=>lock=false,1000);
}

/* PRINT PDF */
function printPDF(){

  let tarikh=document.getElementById("tarikh").value;

  if(!tarikh){
    alert("Pilih tarikh");
    return;
  }

  document.getElementById("loading").style.display="flex";

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"pdf",
      tarikh:tarikh,
      mesyuarat:mesyuaratValue(),
      tempat:tempatValue(),
      masa:masaValue()
    })
  })
  .then(r=>r.json())
  .then(res=>{
    document.getElementById("loading").style.display="none";
    window.open(res.url,"_blank");
  });
}

</script>

</body>
</html>
