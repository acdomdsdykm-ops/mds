<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Scanner Kehadiran</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#064e3b,#022c22);
  color:white;
  text-align:center;
}

h2{margin-top:15px;}

#reader{
  width:320px;
  margin:20px auto;
  border-radius:12px;
  overflow:hidden;
}

/* POPUP */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  color:black;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  opacity:0;
  visibility:hidden;
  transition:0.2s;
  width:80%;
  max-width:320px;
}

.popup.show{
  opacity:1;
  visibility:visible;
}

.okbtn{
  margin-top:15px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  color:white;
}
</style>
</head>

<body>

<h2>📷 Scanner Kehadiran MDS</h2>

<div id="reader"></div>

<!-- POPUP -->
<div id="popup" class="popup">
  <h3>✔ BERJAYA DIREKODKAN</h3>
  <p id="nama"></p>
  <p id="jawatan"></p>
  <button class="okbtn" onclick="closePopup()">OK</button>
</div>

<script>

let scanner;
let lock = false;

const API = "https://script.google.com/macros/s/AKfycbwUfYEUShEnVyld8GIeQTeY3STUDHvwK8QsIqah2D1vFNoup7NMupjsYh-z-6CExH75PA/exec";

/* START SCANNER */
function startScanner(){

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "user" },   // front camera
    { fps: 10, qrbox: 250 },
    qrText => {

      if(lock) return;
      lock = true;

      scanner.stop().catch(()=>{});

      fetch(API,{
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({
          id: qrText
        })
      })
      .then(r=>r.json())
      .then(res=>{

        document.getElementById("nama").innerText = "Nama: " + res.nama;
        document.getElementById("jawatan").innerText = "Jawatan: " + res.jawatan + " • Berjaya direkodkan";

        document.getElementById("popup").classList.add("show");

        setTimeout(()=>{
          document.getElementById("popup").classList.remove("show");
          lock = false;
          startScanner();
        },2000);

      });

    }
  );

}

/* CLOSE POPUP */
function closePopup(){
  document.getElementById("popup").classList.remove("show");
}

/* START */
startScanner();

</script>

</body>
</html>
