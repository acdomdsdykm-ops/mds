<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ahli Mesyuarat/Program MDS</title>

<style>

/* BACKGROUND */
body{
  font-family:Arial;
  text-align:center;
  margin:0;
  min-height:100vh;
  background: linear-gradient(135deg, #064e3b, #022c22);
  color:white;
}

/* HEADER */
.letterhead{
  margin-top:15px;
}

.logo{
  width:90px;
  display:block;
  margin:auto;
}

.org-name{
  font-weight:bold;
  font-size:16px;
  margin-top:5px;
}

.org-address{
  font-size:12px;
  color:#e5e5e5;
}

/* CARD */
.card{
  background:white;
  color:black;
  width:340px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* INPUT */
input,button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#2980b9;
}

.refresh-btn{
  background:#2ecc71;
}

.refresh-btn:hover{
  background:#27ae60;
}

/* ERROR */
#error{
  color:red;
  font-weight:bold;
}

/* ID CARD */
.id-card{
  background: linear-gradient(135deg, #0f9b8e, #2ecc71);
  color:white;
  border-radius:20px;
  padding:20px;
  width:300px;
  margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
  position:relative;
}

.id-card::before{
  content:"";
  position:absolute;
  width:120px;
  height:120px;
  background:rgba(255,255,255,0.15);
  border-radius:50%;
  top:-30px;
  right:-30px;
}

.id-badge{
  background:white;
  color:#333;
  border-radius:15px;
  padding:10px;
  margin-top:10px;
}

/* LOADING */
.loading{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.spinner{
  width:55px;
  height:55px;
  border:5px solid #ccc;
  border-top:5px solid #2ecc71;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="spinner"></div>
  <p id="loadingText">Loading...</p>
</div>

<!-- HEADER -->
<div class="letterhead">
  <img class="logo" src="mds.png">

  <div class="org-name">MAJLIS DAERAH SIMUNJAN</div>
  <div class="org-address">
    Lot 805, Gunong Ngeli New Service Centre,<br>
    94800 Simunjan, Sarawak.
  </div>
</div>

<h2>👤 QR Code Kehadiran Staf</h2>

<!-- SEARCH -->
<div class="card" id="searchBox">

  <input id="namaInput" placeholder="Cari nama staf">
  <input id="icInput" placeholder="4 digit terakhir ID Staf" maxlength="4">

  <button onclick="searchNama()">Semak & Jana QR</button>
  <button class="refresh-btn" onclick="resetPage()">🔄 Refresh</button>

  <p id="error"></p>

</div>

<!-- PROFILE -->
<div id="profile" style="display:none;">

  <div class="id-card">

    <img src="mds.png" style="width:60px;">

    <h3 id="nama">Nama</h3>
    <p id="jawatan">Jawatan</p>

    <div class="id-badge">
      <div>Bahagian</div>
      <b id="bahagian">-</b>
    </div>

    <div id="qrcode" style="margin-top:10px;"></div>

    <p style="font-size:12px;">
      Sila gunakan QR Code ini untuk rekod kehadiran.
    </p>

  </div>

  <div class="card">
    <button class="refresh-btn" onclick="resetPage()">🔄 Cari Semula</button>
  </div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyvQUNAXpEhfIllsliRcpjb-Rr56yM2F_hPtvsLcHQTNQ72CV1Ft5OANuTcP-MoLeA6_w/exec";

/* LOADING */
function showLoading(text){
  document.getElementById("loadingText").innerText = text || "Loading...";
  document.getElementById("loading").style.display="flex";
}

function hideLoading(){
  document.getElementById("loading").style.display="none";
}

/* RESET */
function resetPage(){
  document.getElementById("namaInput").value="";
  document.getElementById("icInput").value="";
  document.getElementById("error").innerText="";
  document.getElementById("searchBox").style.display="block";
  document.getElementById("profile").style.display="none";
  document.getElementById("qrcode").innerHTML="";
}

/* SEARCH */
function searchNama(){

  let nama = document.getElementById("namaInput").value.trim();
  let ic = document.getElementById("icInput").value.trim();

  if(!nama || !ic){
    document.getElementById("error").innerText="Sila isi nama dan 4 digit ID";
    return;
  }

  if(ic.length !== 4){
    document.getElementById("error").innerText="4 digit terakhir ID sahaja";
    return;
  }

  showLoading("Mengesahkan data...");

  fetch(API + "?action=searchNama&nama=" + encodeURIComponent(nama) + "&ic=" + ic)
  .then(r=>r.json())
  .then(res=>{

    hideLoading();

    if(!res.success){
      document.getElementById("error").innerText="Maklumat tidak sah";
      return;
    }

    document.getElementById("searchBox").style.display="none";
    document.getElementById("profile").style.display="block";

    document.getElementById("nama").innerText=res.nama;
    document.getElementById("jawatan").innerText=res.jawatan;
    document.getElementById("bahagian").innerText=res.bahagian;

    let qrData = encodeURIComponent(res.id);

    document.getElementById("qrcode").innerHTML=
      `<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${qrData}">`;

  })
  .catch(()=>{
    hideLoading();
    document.getElementById("error").innerText="Ralat server";
  });

}

/* ENTER */
document.getElementById("icInput").addEventListener("keypress",e=>{
  if(e.key==="Enter") searchNama();
});

</script>

</body>
</html>
