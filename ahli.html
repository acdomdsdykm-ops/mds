<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carian Ahli Mesyuarat MDS</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  text-align:center;
  padding:20px;
}

.card{
  background:white;
  width:320px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input,button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#2980b9;
}

label{
  display:block;
  text-align:left;
  font-weight:bold;
  margin-top:10px;
}

#profile{
  display:none;
}

#qrcode{
  margin-top:15px;
}
</style>
</head>

<body>

<h2>🏛️ Carian Ahli Mesyuarat MDS</h2>

<!-- SEARCH -->
<div class="card">
  <input id="searchId" placeholder="Masukkan ID Ahli (contoh: MDSS001)">
  <button onclick="search()">Cari</button>
</div>

<!-- PROFILE -->
<div class="card" id="profile">

  <h3>👤 Maklumat Ahli</h3>

  <label>Nama</label>
  <p id="nama">-</p>

  <label>Jawatan</label>
  <p id="jawatan">-</p>

  <label>Bahagian</label>
  <p id="bahagian">-</p>

  <h4>📷 QR Code Kehadiran</h4>
  <div id="qrcode"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbz5qjcFfZGoggDneb4Yp05XBgctUumR0qZT_OttSUHQDqjO_PUInodVcTu7Nr2T61_Ftg/exec";

/* SEARCH AHLI */
function search(){

  const input = document.getElementById("searchId");
  const keyword = input.value.trim().toLowerCase();

  if(!keyword){
    alert("Sila masukkan nama");
    return;
  }

  fetch(API + "?action=searchNama&nama=" + encodeURIComponent(keyword))
  .then(r=>r.json())
  .then(res=>{

    if(!res.success){
      alert("Nama tidak dijumpai");
      document.getElementById("profile").style.display = "none";
      return;
    }

    document.getElementById("profile").style.display = "block";

    document.getElementById("nama").innerText = res.nama;
    document.getElementById("jawatan").innerText = res.jawatan;
    document.getElementById("bahagian").innerText = res.bahagian;

    // reset QR
    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"), {
      text: res.id,
      width: 180,
      height: 180
    });

  })
  .catch(err=>{
    console.error(err);
    alert("Ralat sambungan");
  });

}

</script>

</body>
</html>
