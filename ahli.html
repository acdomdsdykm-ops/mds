<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Ahli Mesyuarat</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  text-align:center;
  padding:20px;
}

.card{
  background:white;
  width:320px;
  margin:30px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

input,button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

#profile{
  display:none;
}
</style>
</head>

<body>

<h2>🏛️ Login Ahli Mesyuarat MDS</h2>

<!-- LOGIN -->
<div class="card" id="loginBox">
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="loginAhli()">Login</button>
</div>

<!-- PROFILE -->
<div class="card" id="profile">

  <h3>👤 Profil Ahli</h3>

  <p id="msg"></p>

  <h4>📷 QR Code Ahli</h4>
  <div id="qrcode"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwxxxx/exec";

/* LOGIN AHLI */
function loginAhli(){

  fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"loginAhli",
      user: document.getElementById("user").value,
      pass: document.getElementById("pass").value
    })
  })
  .then(r => r.json())
  .then(res => {

    if(!res.success){
      alert(res.message);
      return;
    }

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("profile").style.display = "block";

    document.getElementById("msg").innerText =
      "Selamat datang " + res.username;

    // QR generate (guna username)
    new QRCode(document.getElementById("qrcode"), {
      text: res.username,
      width: 180,
      height: 180
    });

  });

}

</script>

</body>
</html>
