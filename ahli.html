<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ahli Mesyuarat MDS</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>

body{
  font-family:Arial;
  background:#f5f5f5;
  text-align:center;
}

/* LETTERHEAD */
.letterhead{
  margin-top:15px;
}

.logo{
  width:90px;
  display:block;
  margin:auto;
}

.org-name{
  font-weight:bold;
  font-size:16px;
  margin-top:5px;
}

.org-address{
  font-size:12px;
  color:#333;
}

/* CARD */
.card{
  background:white;
  width:340px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* INPUT */
input,button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#2980b9;
}

/* LABEL */
label{
  display:block;
  text-align:left;
  font-weight:bold;
  margin-top:10px;
}

/* PROFILE */
#profile{
  display:none;
}

/* LOADING */
.loading{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
  color:white;
}

.spinner{
  width:55px;
  height:55px;
  border:5px solid #ccc;
  border-top:5px solid #2ecc71;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* ERROR */
#error{
  color:red;
  font-weight:bold;
}

/* REFRESH BUTTON */
.refresh-btn{
  background:#2ecc71;
  margin-top:10px;
}

.refresh-btn:hover{
  background:#27ae60;
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="spinner"></div>
  <p id="loadingText">Loading...</p>
</div>

<!-- LETTERHEAD -->
<div class="letterhead">
  <img class="logo" src="mds.png">

  <div class="org-name">MAJLIS DAERAH SIMUNJAN</div>
  <div class="org-address">
    Lot 805, Gunong Ngeli New Service Centre,<br>
    94800 Simunjan, Sarawak
  </div>
</div>

<h2>👤 Ahli Mesyuarat MDS</h2>

<!-- SEARCH -->
<div class="card" id="searchBox">

  <label>Nama Ahli</label>
  <input id="namaInput" placeholder="Contoh: sabli / ahmad">

  <button onclick="searchNama()">Cari Ahli</button>

  <!-- 🔵 NEW REFRESH BUTTON -->
  <button class="refresh-btn" onclick="resetPage()">🔄 Refresh</button>

  <p id="error"></p>

</div>

<!-- PROFILE -->
<div class="card" id="profile">

  <h3>📄 Maklumat Ahli</h3>

  <label>Nama</label>
  <p id="nama">-</p>

  <label>Jawatan</label>
  <p id="jawatan">-</p>

  <label>Bahagian</label>
  <p id="bahagian">-</p>

  <h4>📷 QR Code Ahli</h4>
  <div id="qrcode"></div>

  <!-- 🔵 NEW REFRESH BUTTON (PROFILE VIEW) -->
  <button class="refresh-btn" onclick="resetPage()">🔄 Cari Semula</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx_gdPSp4CFDrxmeBi-hLYv6hOr9rYfCr8zen7bs_0W1QgAw7alRFKIvsQUpyp2mT4_Pg/exec";

/* ================= LOADING ================= */
function showLoading(text){
  document.getElementById("loadingText").innerText = text || "Loading...";
  document.getElementById("loading").style.display="flex";
}

function hideLoading(){
  document.getElementById("loading").style.display="none";
}

/* ================= RESET PAGE (NEW) ================= */
function resetPage(){
  document.getElementById("namaInput").value = "";
  document.getElementById("error").innerText = "";

  document.getElementById("searchBox").style.display = "block";
  document.getElementById("profile").style.display = "none";

  document.getElementById("qrcode").innerHTML = "";
}

/* ================= SEARCH ================= */
function searchNama(){

  let nama = document.getElementById("namaInput").value.trim().toLowerCase();

  if(!nama){
    document.getElementById("error").innerText = "Sila masukkan nama ahli";
    return;
  }

  document.getElementById("error").innerText = "";

  showLoading("Dalam semakan, sila tunggu sebentar...");

  fetch(API + "?action=searchNama&nama=" + encodeURIComponent(nama))
  .then(r=>r.json())
  .then(res=>{

    hideLoading();

    if(!res.success){
      document.getElementById("error").innerText = "Tiada rekod, sila cuba lagi...";
      return;
    }

    document.getElementById("searchBox").style.display="none";
    document.getElementById("profile").style.display="block";

    document.getElementById("nama").innerText = res.nama;
    document.getElementById("jawatan").innerText = res.jawatan;
    document.getElementById("bahagian").innerText = res.bahagian;

    new QRCode(document.getElementById("qrcode"), {
      text: res.id,
      width: 180,
      height: 180
    });

  })
  .catch(()=>{
    hideLoading();
    document.getElementById("error").innerText = "Ralat sistem";
  });

}

</script>

</body>
</html>
